<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Oh My Tab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:rgba(255,255,255,0.35);
  color:#1a1a1a;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  overflow:hidden;
  border-radius:14px;
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  display:flex;align-items:center;justify-content:center
}
.overlay-panel{
  width:100%;
  display:flex;flex-direction:column;justify-content:center;padding:10px 0
}
card-list{
  display:flex;gap:10px;padding:0 20px;justify-content:center;align-items:center;flex-wrap:wrap
}
.card{
  width:160px;
  background:rgba(0,0,0,0.05);
  border-radius:10px;overflow:hidden;
  border:1.5px solid rgba(0,0,0,0.06);flex-shrink:0;
  cursor:default;
  transition:transform .12s,border-color .12s,background .12s
}
.card:hover{background:rgba(0,0,0,0.08)}
.card--selected{
  border-color:rgba(0,0,0,0.25);
  transform:scale(1.06);
  background:rgba(0,0,0,0.10);
  box-shadow:0 0 24px rgba(0,0,0,0.06)
}
.icon-wrap{
  height:80px;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.03)
}
.icon-placeholder{
  width:40px;height:40px;border-radius:9px;
  background:linear-gradient(135deg,rgba(0,0,0,0.10),rgba(0,0,0,0.04));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;color:rgba(0,0,0,0.5)
}
.info{padding:8px 10px 10px}
.app-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-title{font-size:10px;color:rgba(0,0,0,0.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.bottom-bar{
  margin-top:6px;height:32px;
  background:rgba(0,0,0,0.04);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:rgba(0,0,0,0.5);flex-shrink:0
}
</style>
</head>
<body>
<div class="overlay-panel" id="panel" style="display:none">
  <card-list id="list"></card-list>
  <div class="bottom-bar" id="title"></div>
</div>
<div id="idle-hint" style="height:100%;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.35);font-size:13px">Hold Option + Tab to switch</div>
<script>
var listEl=document.getElementById("list"),titleEl=document.getElementById("title");
var panel=document.getElementById("panel"),hint=document.getElementById("idle-hint");
var windows=[],selected=0,overlayShown=false,optionHeld=false;

function showPanel(){panel.style.display="flex";hint.style.display="none";overlayShown=true}
function hidePanel(){panel.style.display="none";hint.style.display="flex";overlayShown=false;shrinkToIdle()}

function shrinkToIdle(){window.__TAURI_INTERNALS__.invoke("resize_overlay",{width:280,height:60})}

function resizeToFit(){
  var listH=listEl.scrollHeight;
  var barH=titleEl.scrollHeight+14;
  var totalH=listH+barH;
  var scrollW=listEl.scrollWidth+40;
  var w=Math.min(Math.max(scrollW,400),window.screen.width-100);
  var h=Math.max(totalH,120);
  window.__TAURI_INTERNALS__.invoke("resize_overlay",{width:w,height:h});
}

function render(wins){
  windows=wins;listEl.innerHTML="";
  wins.forEach(function(w,i){
    var card=document.createElement("div");
    card.className="card";card.dataset.index=i;
    card.innerHTML='<div class="icon-wrap"><div class="icon-placeholder">'+w.app_name.charAt(0).toUpperCase()+'</div></div>'
      +'<div class="info"><div class="app-name">'+w.app_name+'</div>'
      +'<div class="win-title">'+(w.window_title||"")+'</div></div>';
    card.addEventListener("click",function(){window.__TAURI_INTERNALS__.invoke("activate_window",{pid:w.pid});hidePanel()});
    listEl.appendChild(card);
  });
  selected=wins.length>1?1:0;select(selected);
  setTimeout(resizeToFit,50);
}
function select(idx){
  if(windows.length===0)return;
  selected=((idx%windows.length)+windows.length)%windows.length;
  document.querySelectorAll(".card").forEach(function(c){c.classList.remove("card--selected")});
  var card=document.querySelector('.card[data-index="'+selected+'"]');
  if(card){
    card.classList.add("card--selected");
    card.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
    titleEl.textContent=windows[selected].app_name+(windows[selected].window_title?" — "+windows[selected].window_title:"");
  }
}
if(!window.__TAURI_INTERNALS__)titleEl.textContent="No Tauri API"

document.addEventListener("keydown",function(e){
  // Option+Tab: show overlay / cycle next
  if(e.altKey&&e.key==="Tab"){
    e.preventDefault();
    if(!overlayShown){
      window.__TAURI_INTERNALS__.invoke("get_windows").then(function(wins){render(wins)});
      showPanel();
    }else{
      select(selected+1);
    }
    return;
  }
  // Option+Shift+Tab: cycle previous
  if(e.altKey&&e.shiftKey&&e.key==="Tab"){
    e.preventDefault();
    if(overlayShown)select(selected-1);
    return;
  }
  if(!overlayShown)return;
  switch(e.key){
    case"Escape":e.preventDefault();hidePanel();break;
    case"Enter":e.preventDefault();if(windows[selected]){window.__TAURI_INTERNALS__.invoke("activate_window",{pid:windows[selected].pid});hidePanel()}break;
    case"ArrowRight":e.preventDefault();select(selected+1);break;
    case"ArrowLeft":e.preventDefault();select(selected-1);break;
  }
});

document.addEventListener("keyup",function(e){
  if(e.key==="Alt"&&overlayShown){
    if(windows[selected])window.__TAURI_INTERNALS__.invoke("activate_window",{pid:windows[selected].pid});
    hidePanel();
  }
});

window.addEventListener("resize",function(){resizeToFit()});
</script>
</body>
</html>
